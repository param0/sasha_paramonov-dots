#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Wayland session identity — REQUIRED for screen capture (OBS / screen share).
# xdg-desktop-portal uses XDG_CURRENT_DESKTOP to pick its backend; without it
# the ScreenCast portal can't reach xdg-desktop-portal-hyprland and OBS shows
# no screen to capture.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GPU / VA-API. NOTE: these were set to nvidia but with a '.' instead of ','
# (invalid Hyprland syntax, so they did nothing). This machine has an AMD
# Radeon RX 580 → use the AMD VA-API driver. If you actually run nvidia,
# change radeonsi→nvidia and mesa→nvidia.
env = LIBVA_DRIVER_NAME,radeonsi
env = __GLX_VENDOR_LIBRARY_NAME,mesa


