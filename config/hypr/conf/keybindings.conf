$MOD = SUPER

# Aplicativos
bind = $MOD, X, exec, $terminal
bind = $MOD SHIFT, X, exec, [float] $terminal
bind = $MOD, E, exec, [float] $fileManager
bind = $MOD, D, exec, $launcher
bind = $MOD, F, exec, brave
bind = $MOD, Z, exec, 
bind = WIN, F1, exec, ~/.config/hypr/assets/gamemode.sh

# Janelas
bind = $MOD, V, togglefloating
bind = $MOD, mouse:274, layoutmsg, swapsplit
bind = $MOD, Tab, focuscurrentorlast
bind = WIN, Tab, fullscreen, 1
bind = , F11, fullscreen
bind = $MOD, Q, killactive
bind = , F1, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | grep -q 'dwindle' && echo 'master' || echo 'dwindle')"
bind = $MOD, mouse:274, layoutmsg, swapwithmaster child

# Sistema
bind = $MOD, ESCAPE, exit
bind = WIN, R, exec, bash -c "hyprctl reload; pkill waybar; pkill dunst; waybar & dunst & notify-send 'Hyprland' 'Configurações recarregadas'"
bind = CTRL SHIFT, ESCAPE, exec, [float; size 800 500; center] $terminal --app-id btop btop

# Screenshots
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Foco
bind = $MOD, left, movefocus, l
bind = $MOD, right, movefocus, r
bind = $MOD, up, movefocus, u
bind = $MOD, down, movefocus, d

# Workspaces
bind = $MOD, 1, workspace, 1
bind = $MOD, 2, workspace, 2
bind = $MOD, 3, workspace, 3
bind = $MOD, 4, workspace, 4
bind = $MOD, 5, workspace, 5
bind = $MOD, 6, workspace, 6
bind = $MOD, 7, workspace, 7
bind = $MOD, 8, workspace, 8
bind = $MOD, 9, workspace, 9
bind = $MOD, 0, workspace, 10

bind = $MOD SHIFT, 1, movetoworkspacesilent, 1
bind = $MOD SHIFT, 2, movetoworkspacesilent, 2
bind = $MOD SHIFT, 3, movetoworkspacesilent, 3
bind = $MOD SHIFT, 4, movetoworkspacesilent, 4
bind = $MOD SHIFT, 5, movetoworkspacesilent, 5
bind = $MOD SHIFT, 6, movetoworkspacesilent, 6
bind = $MOD SHIFT, 7, movetoworkspacesilent, 7
bind = $MOD SHIFT, 8, movetoworkspacesilent, 8
bind = $MOD SHIFT, 9, movetoworkspacesilent, 9
bind = $MOD SHIFT, 0, movetoworkspacesilent, 10

bind = $MOD, S, togglespecialworkspace, magic
bind = $MOD CTRL, M, movetoworkspacesilent, +0
bind = $MOD CTRL, S, movetoworkspacesilent, special:magic

bindm = $MOD, mouse:272, movewindow
bindm = $MOD, mouse:273, resizewindow

# Mídia
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $MOD, W, exec, killall waybar; waybar &

# Блюр

# Заготовка под бесконечность (строго на Alt, чтобы вяленый не подавился модификаторами)
bind = ALT, mouse:272, exec, echo drag_start > /tmp/infinite-drag
bindr = ALT, mouse:272, exec, echo drag_end > /tmp/infinite-drag
bindr = ALT, Alt_L, exec, echo drag_end > /tmp/infinite-drag
bind = $MOD, B, exec, ~/scripts/toggle_opacity.sh
# Прокрутка фокуса между окнами на текущем столе

# Если нужно листать не окна, а рабочие столы, на которых есть окна (пропуск пустых):
# Прокрутка рабочих столов (только с окнами)
bind = $MOD, mouse_down, workspace, +1
bind = $MOD, mouse_up, workspace, -1
